<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/geral.css">
    <title>Portfolio</title>
</head>
<body>
    <!-- Barra de progresso -->
    <div class="progress-bar"></div>

    <!-- Container Principal -->
    <div class="container-inicio">
        <!-- Lado Esquerdo -->
        <div class="leftside">
            <!-- Area de texto -->
            <div class="descricao">
                <div class="titulo">
                    <h1>Olá, eu sou o Emanuel Borges,</h1>
                </div>
                <div class="texto-descr">
                    Um estudante de Desenvolvimento de Sistemas, apaixonado por tecnologia e inovação.
                </div>
            </div>
        </div>
        <!-- Rigthside -->
        <div class="rightside">
            <img src="../img/eu.jpg" alt="Foto do Emanuel">
        </div>
    </div>
    <!-- Container de informações -->
    <div class="container-tecnologias">
        <!-- Linguagens que sei utilizar -->
        <div class="linguagens">
            <h2>Tecnologias que sei utilizar</h2>
            <img src="../img/tecnologia/python.png" alt="Python" onclick="infoPython()">  
            <img src="../img/tecnologia/c-plus-plus.png" alt="C++" onclick="infoCpp()">  
            <img src="../img/tecnologia/javascript.png" alt="JavaScript" onclick="infoJS()">  
            <img src="../img/tecnologia/html.png" alt="HTML/" onclick="infoHTML()">
            <img src="../img/tecnologia/css.png" alt="HTML/" onclick="infoHTML()">
            <img src="../img/tecnologia/godot.png" alt="Godot" onclick="infoGodot()">   
        </div>
        <!-- Aplicações que utilizo no dia-a-dia -->
        <div class="aplicacoes">
            <h2>Aplicações que utilizo no meu dia-a-dia</h2>
            <img src="../img/aplicacoes/git-hub.png" alt="Git Hub" onclick="infoGitHub()">
            <img src="../img/aplicacoes/mysql.png" alt="Mysql" onclick="infoMysql()">
            <img src="../img/tecnologia/godot.png" alt="Godot" onclick="infoGodot()">   
        </div>
   </div>

<footer>
